# Local development environment for ResumeTailor.
# Run: docker compose up --build
# Apply migrations: docker compose exec web python manage.py migrate
#
# NOTE: Both `web` and `worker` share the same SQLite file via the `sqlite_data`
# named volume.  Scale web/worker to a single replica only — SQLite does not
# support concurrent writers across processes.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      DJANGO_SETTINGS_MODULE: resumetailor.settings.base
      SQLITE_DB_PATH: /app/data/resumetailor.sqlite3
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env.local
    environment:
      DJANGO_SETTINGS_MODULE: resumetailor.settings.base
      SQLITE_DB_PATH: /app/data/resumetailor.sqlite3
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  sqlite_data:
