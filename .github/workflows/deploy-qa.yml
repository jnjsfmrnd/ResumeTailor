name: Deploy QA

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and deploy (default: git SHA)'
        required: false
        default: ''
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# Prevent concurrent QA deployments; cancel any in-progress run when a new one starts.
concurrency:
  group: deploy-qa
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: rg-resumetailor-qa
  REGISTRY_NAME: crresumetailor
  REGISTRY_LOGIN_SERVER: crresumetailor.azurecr.io
  WEB_APP_NAME: ca-web-resumetailor-qa
  WORKER_APP_NAME: ca-worker-resumetailor-qa
  SETUP_JOB_NAME: job-setup-resumetailor-qa
  # Use the triggering commit SHA so workflow_run deploys the right code.
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  validate-bicep:
    name: Bicep validate and what-if
    runs-on: ubuntu-latest
    # For workflow_run: only proceed when CI passed; always run for manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Bicep build (lint)
        uses: azure/cli@v3
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep

      - name: Bicep what-if
        uses: azure/cli@v3
        with:
          inlineScript: |
            az deployment group what-if \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters infra/parameters/qa.bicepparam \
              --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
                           storageAccountKey="${{ secrets.AZURE_STORAGE_KEY }}" \
                           djangoSecretKey="${{ secrets.DJANGO_SECRET_KEY }}" \
                           githubModelsApiKey="${{ secrets.GITHUB_MODELS_API_KEY }}" \
                           djangoAllowedHosts="${{ secrets.DJANGO_ALLOWED_HOSTS }}"

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: validate-bicep
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set image tag
        id: set-tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ env.DEPLOY_SHA }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      # Buildx enables BuildKit features including the GitHub Actions cache driver.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: azure/cli@v3
        with:
          inlineScript: |
            az acr login --name ${{ env.REGISTRY_NAME }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_LOGIN_SERVER }}/resumetailor-web:${{ steps.set-tag.outputs.tag }}
            ${{ env.REGISTRY_LOGIN_SERVER }}/resumetailor-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY_LOGIN_SERVER }}/resumetailor-worker:${{ steps.set-tag.outputs.tag }}
            ${{ env.REGISTRY_LOGIN_SERVER }}/resumetailor-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Deploy infrastructure and apps
        uses: azure/cli@v3
        with:
          inlineScript: |
            az deployment group create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters infra/parameters/qa.bicepparam \
              --parameters imageTag="${{ needs.build-and-push.outputs.image_tag }}" \
                           postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
                           storageAccountKey="${{ secrets.AZURE_STORAGE_KEY }}" \
                           djangoSecretKey="${{ secrets.DJANGO_SECRET_KEY }}" \
                           githubModelsApiKey="${{ secrets.GITHUB_MODELS_API_KEY }}" \
                           djangoAllowedHosts="${{ secrets.DJANGO_ALLOWED_HOSTS }}"

      # Container Apps Job runs migrate + collectstatic as a reliable one-off task.
      - name: Run database setup (migrate + collectstatic)
        uses: azure/cli@v3
        with:
          inlineScript: |
            az containerapp job start \
              --name ${{ env.SETUP_JOB_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }}

            echo "Waiting for database setup job to complete (max 10 min)..."
            for i in $(seq 1 60); do
              STATUS=$(az containerapp job execution list \
                --name ${{ env.SETUP_JOB_NAME }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --query "sort_by([],&properties.startTime)[-1].properties.status" \
                -o tsv 2>/dev/null || echo "Unknown")
              echo "  attempt $i/60: $STATUS"
              if [ "$STATUS" = "Succeeded" ]; then
                echo "Database setup completed successfully."
                exit 0
              fi
              if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Stopped" ]; then
                echo "Database setup failed with status: $STATUS"
                exit 1
              fi
              sleep 10
            done
            echo "Database setup timed out after 10 minutes"
            exit 1

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run smoke tests
        run: python scripts/smoke.py
        env:
          SMOKE_BASE_URL: ${{ secrets.QA_BASE_URL }}
