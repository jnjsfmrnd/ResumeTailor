name: CI

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Django check + pytest
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: resumetailor.settings.test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django pytest-cov ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Django system check
        run: python manage.py check

      - name: Run pytest with coverage
        run: python -m pytest --tb=short -q --cov=. --cov-report=term-missing
        env:
          DJANGO_SETTINGS_MODULE: resumetailor.settings.test
