name: Planning Gate

on:
  workflow_dispatch:

jobs:
  planning-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify planning artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/data-science/baselines/resume-tailor-v1-baseline.json
          test -f infra/main.bicep
          test -f infra/parameters/qa.bicepparam
          test -f manage.py
          test -f pyproject.toml
          echo "Planning scaffold checks passed."
